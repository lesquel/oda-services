# .air.toml — hot-reload config for read-api
root = "."
tmp_dir = "tmp"

[build]
  cmd        = "go build -o ./tmp/main ./cmd/server"
  bin        = "./tmp/main"
  delay      = 1000
  exclude_dir = ["tmp", "vendor", "testdata"]
  include_ext = ["go", "tmpl", "html"]
  kill_delay  = "0.5s"
  rerun       = false
  stop_on_error = true

[log]
  time = true

[color]
  app  = "green"
  main = "magenta"
  watcher = "cyan"

[misc]
  clean_on_exit = true
